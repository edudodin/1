<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Feliz Dia das Mulheres ❤️</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background: linear-gradient(135deg,#ff9ecf,#ffe3f1);
text-align:center;
color:#333;
overflow-x:hidden;
}

header{
padding:40px;
color:white;
font-size:35px;
font-weight:bold;
animation: aparecer 2s;
}

@keyframes aparecer{
from{opacity:0; transform:translateY(-30px);}
to{opacity:1; transform:translateY(0);}
}

.container{
padding:20px;
}

.mensagem{
background:white;
padding:25px;
border-radius:15px;
max-width:600px;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.2);
min-height:80px;
}

.carousel{
position:relative;
width:90%;
max-width:350px;
height:350px;
margin:30px auto;
display:flex;
align-items:center;
justify-content:center;
}

.carousel img{
width:100%;
height:100%;
object-fit:cover;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
transition:0.5s;
}

/* BOTÕES FIXOS */

.carousel button{
position:absolute;
top:50%;
transform:translateY(-50%);
margin:0;
padding:10px 15px;
font-size:18px;
}

.carousel button:first-child{
left:-10px;
}

.carousel button:last-child{
right:-10px;
}

button{
margin:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff1a8c;
}

#tempo{
font-size:22px;
margin-top:20px;
font-weight:bold;
}

@keyframes cair{
0%{transform: translateY(-10px);}
100%{transform: translateY(100vh);}
}

#telaCheia{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

#telaCheia img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.musica{
background:white;
width:90%;
max-width:320px;
margin:20px auto;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#capa{
width:100%;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.info-musica{
margin-top:10px;
font-size:18px;
}
</style>
</head>

<body>

<header>
🌸 Feliz Dia das Mulheres 🌸
</header>

<div class="container">

<div class="mensagem">
<p id="texto"></p>
</div>

<h2>📸 Nossos Momentos</h2>

<div class="carousel">
<button onclick="voltar()">⬅</button>
<img id="foto" src="foto1.jpeg">
<button onclick="proxima()">➡</button>
</div>
<div id="telaCheia" onclick="fecharFoto()">
<img id="fotoGrande">
</div>
<h2>🎵 Nossa Música</h2>

<div class="musica">

<img id="capa" src="capa.jpg">

<div class="info-musica">
<b>I'll Take Care Of You</b><br>
Tyler, The Creator
</div>

<audio autoplay loop controls>
<source src="Tyler, The Creator - I'll Take Care Of You (Clean).mp3" type="audio/mpeg">
</audio>

</div>

<h2>⏳ Nosso Tempo Juntos</h2>

<div id="tempo"></div>

<br>

<button onclick="surpresa()">🎁 Clique para uma surpresa</button>

</div>

<script>

/* TEXTO APARECENDO */
var mensagem = "Hoje é um dia especial para lembrar o quanto você é incrível. Obrigado por todos os momentos, risadas e carinho. Você torna tudo mais bonito. ❤️";
var pos = 0;

function escrever(){
if(pos < mensagem.length){
document.getElementById("texto").innerHTML += mensagem.charAt(pos);
pos++;
setTimeout(escrever,50);
}
}

escrever();

/* CARROSSEL */

var i = 1;

function proxima(){

i++;

if(i > 25){
i = 1;
}

var img = document.getElementById("foto");
img.style.display = "block";
img.src = "foto" + i + ".jpeg";

}

function voltar(){

i--;

if(i < 1){
i = 25;
}

var img = document.getElementById("foto");
img.style.display = "block";
img.src = "foto" + i + ".jpeg";

}
/* CONTADOR */

var inicio = new Date("2025-11-28");

function atualizarTempo(){

var agora = new Date();

var diff = agora - inicio;

var dias = Math.floor(diff / (1000*60*60*24));
var horas = Math.floor((diff / (1000*60*60)) % 24);
var minutos = Math.floor((diff / (1000*60)) % 60);
var segundos = Math.floor((diff / 1000) % 60);

document.getElementById("tempo").innerHTML =
dias + " dias " +
horas + " horas " +
minutos + " minutos " +
segundos + " segundos ❤️";

}

setInterval(atualizarTempo,1000);
atualizarTempo();

/* CORAÇÕES */

function criarCoracao(){

let coracao = document.createElement("div");

coracao.innerHTML = "❤️";

coracao.style.position = "fixed";
coracao.style.top = "-10px";
coracao.style.left = Math.random() * window.innerWidth + "px";
coracao.style.fontSize = "25px";
coracao.style.animation = "cair 5s linear";

document.body.appendChild(coracao);

setTimeout(() => {
coracao.remove();
},5000);

}

setInterval(criarCoracao,500);

/* BOTÃO SURPRESA */

function surpresa(){
alert("Você é muito especial para mim ❤️");
}

document.getElementById("foto").onclick = function(){
let tela = document.getElementById("telaCheia");
let grande = document.getElementById("fotoGrande");

grande.src = this.src;
tela.style.display = "flex";
}

function fecharFoto(){
document.getElementById("telaCheia").style.display = "none";
}
</script>

</body>
</html>
